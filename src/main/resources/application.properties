spring.application.name=Distributed-Shopping-Cart-Service-with-RedisCaching

# Redis Connection Configuration
# Support both modern (spring.data.redis.*) and legacy (spring.redis.*) keys to guarantee compatibility
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}

# Enable Redis Cache Statistics
spring.cache.type=redis

# Expose Spring Actuator Endpoints for health checking and container readiness
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
